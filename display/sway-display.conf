# StackPI status-display sway config — single-window kiosk.
default_border          none
default_floating_border none
hide_edge_borders       both
focus_follows_mouse     no
seat * hide_cursor      2000

output * background #0d0d12 solid_color

# The display browser window (chromium --class=stackpi-display).
for_window [app_id="stackpi-display"] fullscreen enable

# Recovery: hold Ctrl+Shift+Alt+Q on an attached keyboard to exit.
bindsym Ctrl+Shift+Mod1+q exit

exec /usr/local/bin/display-kiosk-launch.sh
