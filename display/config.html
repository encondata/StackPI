<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>StackPI Display — Config</title>
<style>
  :root { color-scheme: dark; }
  body { margin:0; font-family: system-ui, sans-serif; background:#0d0d12; color:#e4e4e7; }
  .wrap { max-width: 640px; margin: 0 auto; padding: 24px 16px 64px; }
  h1 { font-size: 20px; } h2 { font-size: 14px; text-transform: uppercase; letter-spacing:.1em; color:#a1a1aa; margin: 28px 0 10px; }
  .card { background:#18181b; border:1px solid #27272a; border-radius:12px; padding:16px; }
  label { display:block; font-size:12px; color:#a1a1aa; margin-top:10px; }
  input, select { width:100%; box-sizing:border-box; margin-top:4px; padding:8px 10px; border-radius:8px;
    border:1px solid #3f3f46; background:#111114; color:#e4e4e7; font-size:14px; }
  button { margin-top:14px; padding:8px 16px; border:0; border-radius:8px; background:#2563eb; color:#fff; font-weight:600; font-size:14px; cursor:pointer; }
  button.sec { background:#27272a; }
  .row { display:flex; gap:8px; align-items:center; justify-content:space-between; padding:8px 0; border-top:1px solid #27272a; }
  .row:first-child { border-top:0; }
  .msg { margin-top:12px; font-size:13px; padding:8px 10px; border-radius:8px; }
  .ok { background:#052e1f; color:#86efac; } .err { background:#3b0a0a; color:#fca5a5; }
  .mono { font-family: ui-monospace, monospace; font-size:12px; color:#a1a1aa; }
</style>
</head>
<body>
<div class="wrap">
  <h1>StackPI Display — Config</h1>

  <h2>Network</h2>
  <div class="card">
    <div id="net" class="mono">…</div>
    <button class="sec" onclick="scan()">Scan Wi-Fi</button>
    <div id="wifi"></div>
    <label>Password (for the selected network)</label>
    <input id="pw" type="password" placeholder="leave blank for open networks" />
    <div id="wifiMsg"></div>
  </div>

  <h2>Display</h2>
  <div class="card">
    <label>Multicast group</label>
    <input id="group" />
    <label>Multicast port</label>
    <input id="port" type="number" />
    <label>Screen</label>
    <select id="screen"><option value="status">status</option><option value="trucks">trucks</option></select>
    <button onclick="saveCfg()">Save</button>
    <div id="cfgMsg"></div>
  </div>

  <h2>Software update</h2>
  <div class="card">
    <div id="ver" class="mono">…</div>
    <label>Branch</label>
    <select id="branch"></select>
    <label>Commit</label>
    <select id="commit"></select>
    <div style="display:flex; gap:8px; align-items:center">
      <button id="updBtn" onclick="startUpdate()">Update</button>
      <button class="sec" onclick="loadBranches()">Refresh</button>
    </div>
    <div id="updMsg"></div>
    <pre id="updLog" class="mono" style="white-space:pre-wrap; max-height:220px; overflow:auto; margin-top:10px; display:none"></pre>
  </div>
</div>

<script>
let selectedSsid = "";
async function j(url, opts){ const r = await fetch(url, opts); return { ok:r.ok, body: await r.json().catch(()=>({})) }; }

async function loadNet(){
  const { body } = await j("/api/net");
  const ips = (body.addresses||[]).join(", ") || "—";
  document.getElementById("net").textContent = "IP: " + ips;
}
async function scan(){
  const box = document.getElementById("wifi");
  box.replaceChildren(el("div", "mono", "scanning…"));
  const { body } = await j("/api/wifi/scan");
  const nets = body.networks||[];
  if (!nets.length){ box.replaceChildren(el("div", "mono", "no networks found")); return; }
  // Build rows with DOM APIs (textContent / addEventListener) — never string
  // concatenation — so a crafted SSID can't inject markup or script.
  box.replaceChildren(...nets.map(n => {
    const row = el("div", "row");
    const label = el("span", null, (n.in_use ? "● " : "") + (n.ssid || ""));
    label.appendChild(el("span", "mono", " " + n.signal + "% " + (n.security || "")));
    const btn = el("button", "sec", "Connect");
    btn.addEventListener("click", () => connect(n.ssid));
    row.append(label, btn);
    return row;
  }));
}
function el(tag, cls, text){
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text != null) e.textContent = text;
  return e;
}
async function connect(ssid){
  selectedSsid = ssid;
  const pw = document.getElementById("pw").value;
  msg("wifiMsg", "connecting to " + ssid + "…");
  const { body } = await j("/api/wifi/connect", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ ssid, password: pw }) });
  msg("wifiMsg", body.ok ? ("Connected to " + ssid + ".") : ("Failed (" + (body.status||"error") + ")."), body.ok);
  loadNet();
}
async function loadCfg(){
  const { body } = await j("/api/config");
  document.getElementById("group").value = body.multicast_group||"";
  document.getElementById("port").value = body.multicast_port||"";
  document.getElementById("screen").value = body.screen||"status";
}
async function saveCfg(){
  const payload = { multicast_group: document.getElementById("group").value.trim(),
                    multicast_port: Number(document.getElementById("port").value),
                    screen: document.getElementById("screen").value };
  const { body, ok } = await j("/api/config", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(payload) });
  msg("cfgMsg", ok ? "Saved." : ("Failed: " + (body.error||"")), ok);
}
function msg(id, text, ok){ const e=document.getElementById(id); e.className="msg "+(ok===undefined?"":ok?"ok":"err"); e.textContent=text; }

// --- software update ---
let updTimer = null;
async function loadBranches(){
  const sel = document.getElementById("branch");
  sel.replaceChildren(el("option", null, "loading…"));
  const { body } = await j("/api/update/branches");
  const branches = body.branches || [];
  const cur = body.current_branch;
  sel.replaceChildren(...branches.map(b => { const o = el("option", null, b); o.value = b; return o; }));
  if (cur && branches.includes(cur)) sel.value = cur;
  sel.onchange = loadCommits;
  await loadCommits();
}
async function loadCommits(){
  const branch = document.getElementById("branch").value;
  const sel = document.getElementById("commit");
  if (!branch){ sel.replaceChildren(); return; }
  sel.replaceChildren(el("option", null, "loading…"));
  const { body } = await j("/api/update/commits?branch=" + encodeURIComponent(branch) + "&limit=20");
  const commits = body.commits || [];
  // Dropdown shows only the short id + date; the tip is the default.
  sel.replaceChildren(...commits.map((c, i) => {
    const o = el("option", null, c.short + "  " + (c.date || "").slice(0, 10) + (i === 0 ? "  (latest)" : ""));
    o.value = c.sha; return o;
  }));
  refreshStatus();
}
async function refreshStatus(){
  const branch = document.getElementById("branch").value;
  const commit = document.getElementById("commit").value;
  const qs = "?branch=" + encodeURIComponent(branch) + (commit ? "&commit=" + encodeURIComponent(commit) : "");
  const { body } = await j("/api/update/status" + qs);
  const cur = body.current_short || "?";
  document.getElementById("ver").textContent =
    "Installed: " + cur + (body.update_available ? ("  →  " + (body.target_short || "?") + " (" + body.behind + " behind)") : "  (up to date)");
  return body;
}
async function startUpdate(){
  const branch = document.getElementById("branch").value;
  const commit = document.getElementById("commit").value || undefined;
  document.getElementById("updBtn").disabled = true;
  msg("updMsg", "Starting update…");
  const { ok, body } = await j("/api/update/start", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ branch, commit }) });
  if (!ok && !body.started){ msg("updMsg", "Failed: " + (body.error || "could not start"), false); document.getElementById("updBtn").disabled = false; return; }
  msg("updMsg", "Updating — the display will rebuild and restart. This can take a few minutes on a Pi.");
  document.getElementById("updLog").style.display = "block";
  pollUpdate();
}
function pollUpdate(){
  if (updTimer) clearInterval(updTimer);
  updTimer = setInterval(async () => {
    let body;
    try { body = await refreshStatus(); } catch { return; }  // receiver restart → transient fetch error
    const logEl = document.getElementById("updLog");
    logEl.textContent = body.log_tail || "";
    logEl.scrollTop = logEl.scrollHeight;
    if (body.state === "success"){ clearInterval(updTimer); msg("updMsg", "Update complete.", true); document.getElementById("updBtn").disabled = false; }
    else if (body.state === "failed"){ clearInterval(updTimer); msg("updMsg", "Update failed — see the log below.", false); document.getElementById("updBtn").disabled = false; }
  }, 2000);
}

loadNet(); loadCfg(); loadBranches();
</script>
</body>
</html>
