[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32@7.0.1
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 115200
; pin to the USB-serial adapter so PlatformIO never auto-picks Bluetooth
upload_port = /dev/cu.usbserial*
monitor_port = /dev/cu.usbserial*
board_build.filesystem = littlefs
build_src_filter = +<*>
lib_deps =
  bblanchon/ArduinoJson@^7.2.0
  https://github.com/tzapu/WiFiManager.git
  ayushsharma82/ElegantOTA@^3.1.0
; ELEGANTOTA_USE_ASYNC_WEBSERVER=0 -> use the built-in (sync) WebServer we already run
build_flags = -DCORE_DEBUG_LEVEL=3 -DELEGANTOTA_USE_ASYNC_WEBSERVER=0

; OTA push env: pio run -e ota -t upload  (flashes over Wi-Fi via espota/mDNS)
[env:ota]
extends = env:esp32dev
upload_protocol = espota
upload_port = stacklight.local
; if mDNS doesn't resolve, override on the CLI: --upload-port <device-ip>

[env:native]
platform = native
test_framework = unity
build_flags = -std=gnu++17
test_build_src = true
; native compiles ONLY the Arduino-free modules:
build_src_filter = +<protocol.cpp> +<lamp_state.cpp> +<wav.cpp> +<sound_map.cpp> +<net_validate.cpp> +<watchdog.cpp>
lib_deps =
  bblanchon/ArduinoJson@^7.2.0
