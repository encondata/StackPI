# StackPI sway config — multi-output kiosk session.
#
# Pinning:
#   DSI-1     → PITFT50 touchscreen  → /        (ws 1, logo / pairing QR)
#   HDMI-A-1  → info monitor (HDMI)  → /clock   (ws 2)
#
# The PITFT50 sits on the DSI ribbon, not HDMI. If only the touchscreen is
# present, both chromium windows land on it; ws 1 (config) is shown, ws 2
# (info) is in the background. Plug in HDMI and the info window migrates.
#
# Inspect live output names with:  swaymsg -t get_outputs

# ── No chrome, no titlebars, no bar ────────────────────────────────────────
default_border          none
default_floating_border none
font                    monospace 8
hide_edge_borders       both
focus_follows_mouse     no
mouse_warping           none

# ── Cursor disappears after 2s of idle (kiosk feel) ────────────────────────
seat * hide_cursor      2000

# ── Output config ──────────────────────────────────────────────────────────
# Resolutions come from EDID; we only set positions so the layout is stable
# (PITFT50 to the right of the HDMI monitor — they don't need to abut, this
# is just so sway has a deterministic global geometry).
output HDMI-A-1 position 0    0
output DSI-1    position 1920 0
# Second HDMI info display (optional — only rendered if physically connected;
# the launch script spawns its chromium window only when HDMI-A-2 is present).
output HDMI-A-2 position 3840 0

# StackPI logo wallpaper. Shown for the brief window between sway starting
# and chromium painting on top; also visible at the edges if chromium ever
# closes/crashes (rather than going to a bare desktop). 'fit' keeps the
# logo at its aspect ratio; the surrounding fill matches the plymouth
# splash so the boot → wm handoff is visually continuous.
output * background /etc/stackpi/stackpi-logo.png fit #0d0d12

# Touch input — pin the PITFT50 panel's touch surface to DSI-1 so taps land
# on the right coordinates regardless of how sway orders the outputs.
input type:touch map_to_output DSI-1

# ── Workspaces pinned to outputs ───────────────────────────────────────────
workspace 1 output DSI-1
workspace 2 output HDMI-A-1
workspace 3 output HDMI-A-2

# ── Window placement by chromium --class (becomes the wayland app_id) ──────
for_window [app_id="stackpi-config"] move container to workspace 1, fullscreen enable, focus
for_window [app_id="stackpi-info"]   move container to workspace 2, fullscreen enable
for_window [app_id="stackpi-info2"]  move container to workspace 3, fullscreen enable

# ── Recovery binding: hold Ctrl+Shift+Alt+Q on an attached keyboard to exit
bindsym Ctrl+Shift+Mod1+q exit

# ── Launch the two chromium instances after sway is up ─────────────────────
exec /usr/local/bin/stackpi-kiosk-launch.sh
